<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thank you for your GameHub order." />
  <title>GameHub | Order Confirmation</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>
  <header>
    <nav>
      <a href="../../" class="logo">
        <img src="../../images/game-hub-logo.png" alt="GameHub logo" />
      </a>
      <a href="../../checkout/" class="basket-link">
        Basket <span id="cart-count" class="cart-count">0</span>
      </a>
    </nav>
  </header>

  <main>
    <section class="confirmation-box">
      <h1>Thank you for your order!</h1>
      <p>Your GameHub order has been completed successfully.</p>
      <p>A confirmation email will be sent to you shortly.</p>
      <a href="../../" class="button-link">Back to games</a>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 GameHub</p>
  </footer>

  <script type="module" src="../../js/confirmation.js"></script>
</body>
</html>
